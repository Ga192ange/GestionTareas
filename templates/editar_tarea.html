<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Tarea</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
</head>
<body>

<div class="form-container">

    <a href="/tareas">
    <button type="button" class="btn-volver">
        ← Volver
    </button>
</a>

<h1>Editar Tarea</h1>

<form method="POST">

    <input type="text" name="titulo" value="{{ tarea.titulo }}" required>

    <br><br>

    <textarea name="descripcion" required>{{ tarea.descripcion }}</textarea>

    <br><br>

    <input type="text" name="usuario" value="{{ tarea.usuario }}" required>

    <br><br>

    <input type="text" name="proyecto" value="{{ tarea.proyecto }}" required>

    <br><br>

    <input type="text" name="prioridad" value="{{ tarea.prioridad }}" required>

    <br><br>

    <input type="text" name="estado" value="{{ tarea.estado }}" required>

    <br><br>

    <button type="submit">
        Guardar Cambios
    </button>

</form>

</div>
</body>
</html>
