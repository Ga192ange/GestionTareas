<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Proyecto</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
</head>
<body>
    <div class="form-container">

    <a href="/proyectos">
    <button type="button" class="btn-volver">
        ← Volver
    </button>
</a>

<h1>Editar Proyecto</h1>

<form method="POST">

    <input
        type="text"
        name="nombre"
        value="{{ proyecto.nombre }}"
        required
    >

    <br><br>

    <textarea
        name="descripcion"
        required
    >{{ proyecto.descripcion }}</textarea>

    <br><br>

    <input
        type="text"
        name="estado"
        value="{{ proyecto.estado }}"
        required
    >

    <br><br>

    <button type="submit">
        Guardar Cambios
    </button>

</form>

</div>
</body>
</html>
