<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-container">

<h1>Gestión De Tareas</h1>

<p class="subtitulo">
Inicia sesión para continuar
</p>

<form method="POST">

<input
type="email"
name="correo"
placeholder="Correo"
required
>

<input
type="password"
name="password"
placeholder="Contraseña"
required
>

<div class="botones-horizontal">

    <button type="submit">
        Ingresar
    </button>

    <a href="/registro">
        <button type="button">
            Registrarme
        </button>
    </a>

</div>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
